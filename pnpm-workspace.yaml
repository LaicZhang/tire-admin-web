  axios: 1.18.1
  form-data: '>=4.0.6'
  lodash-es: '>=4.17.24'
  tar: '>=7.5.16'
  rollup: 4.59.0
  defu: '>=6.1.5'
  picomatch@2: '>=2.3.2'
